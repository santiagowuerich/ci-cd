name: CI/CD Pipeline Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ── STAGE 1: CHECKOUT ─────────────────────────────────
      - name: Obtener código del repositorio
        uses: actions/checkout@v3

      # ── STAGE 2: SETUP PNPM ──────────────────────────────
      # IMPORTANTE: uses (no run), y antes que setup-node
      - name: Instalar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # ── STAGE 3: SETUP NODE (con cache pnpm) ─────────────
      - name: Configurar Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      # ── STAGE 4: INSTALAR DEPENDENCIAS ───────────────────
      # --frozen-lockfile: usa exactamente las versiones del lockfile
      - name: Instalar dependencias
        run: pnpm install

      # ── STAGE 5: BUILD ────────────────────────────────────
      - name: Ejecutar Build
        run: pnpm run build

      # ── STAGE 6: TESTS ────────────────────────────────────
      - name: Ejecutar Tests automatizados
        run: pnpm test

       # ✅ NOTIFICACIÓN SLACK - ÉXITO
      - name: Notificar Slack - Éxito
        if: success()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *Pipeline Exitoso - Vercel desplegando!*",
            "attachments": [{
              "color": "#36a64f",
              "fields": [
                {"title":"Repositorio", "value":"${{ github.repository }}", "short":true},
                {"title":"Autor", "value":"${{ github.actor }}", "short":true},
                {"title":"Commit", "value":"${{ github.sha }}", "short":true},
                {"title":"Status", "value":"Tests OK ✅ → Deploy OK ✅", "short":false}
              ]
            }]
          }'

      # ❌ NOTIFICACIÓN SLACK - FALLA
      - name: Notificar Slack - Falla
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *Pipeline FALLIDO - Deploy CANCELADO*",
            "attachments": [{
              "color": "#ff0000",
              "fields": [
                {"title":"Repositorio", "value":"${{ github.repository }}", "short":true},
                {"title":"Autor", "value":"${{ github.actor }}", "short":true},
                {"title":"Commit", "value":"${{ github.sha }}", "short":true}
              ]
            }]
          }'