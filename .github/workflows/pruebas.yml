name: CI/CD Pipeline Completo

on:
  push:
    branches: 
      - main
      - develop
      - 'JIRA-*'
  pull_request:
    branches: 
      - main
      - develop

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      # ── STAGE 1: CHECKOUT ─────────────────────────────────
      - name: Obtener código del repositorio
        uses: actions/checkout@v3

      # ── STAGE 2: SETUP PNPM ──────────────────────────────
      - name: Instalar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      # ── STAGE 3: SETUP NODE (con cache pnpm) ─────────────
      - name: Configurar Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'

      # ── STAGE 4: INSTALAR DEPENDENCIAS ───────────────────
      # --frozen-lockfile: usa exactamente las versiones del lockfile
      - name: Instalar dependencias
        run: pnpm install

      # ── STAGE 5: BUILD ────────────────────────────────────
      - name: Ejecutar Build
        run: pnpm run build

      # ── STAGE 6: TESTS ────────────────────────────────────
      - name: Ejecutar Tests automatizados
        run: pnpm test
      # ── STAGE 7- EXTRAER ISSUE KEY DE JIRA ────────────────────────────────────
      - name: Extraer issue key de Jira
        id: jira
        if: always()
        run: |
          ISSUE_KEY=$(echo "${{ steps.commit.outputs.message }} ${{ github.ref_name }}" | grep -oE '${{ secrets.JIRA_PROJECT_KEY }}-[0-9]+' | head -1)
          echo "issue_key=$ISSUE_KEY" >> $GITHUB_OUTPUT
          echo "Issue Jira detectado: $ISSUE_KEY"


       # ✅ NOTIFICACIÓN SLACK - ÉXITO
      - name: Notificar Slack - Éxito
        if: success()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "✅ *Pipeline Exitoso - Vercel desplegando!*",
            "attachments": [{
              "color": "#36a64f",
              "fields": [
                {"title":"Repositorio", "value":"${{ github.repository }}", "short":true},
                {"title":"Autor", "value":"${{ github.actor }}", "short":true},
                {"title":"Rama", "value":"${{ github.ref_name }}", "short":true},
                {"title":"Commit", "value":"${{ github.sha }}", "short":true},
                {"title":"Comentario del commit", "value":"${{ github.event.head_commit.message }}", "short":false},
                {"title":"Status", "value":"Tests OK ✅ → Deploy OK ✅", "short":false}
              ]
            }]
          }'

      # ❌ NOTIFICACIÓN SLACK - FALLA
      - name: Notificar Slack - Falla
        if: failure()
        run: |
          curl -s -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          -H 'Content-type: application/json' \
          --data '{
            "text": "❌ *Pipeline FALLIDO - Deploy CANCELADO*",
            "attachments": [{
              "color": "#ff0000",
              "fields": [
                {"title":"Repositorio", "value":"${{ github.repository }}", "short":true},
                {"title":"Autor", "value":"${{ github.actor }}", "short":true},
                {"title":"Rama", "value":"${{ github.ref_name }}", "short":true},
                {"title":"Commit", "value":"${{ github.sha }}", "short":true},
                {"title":"Comentario del commit", "value":"${{ github.event.head_commit.message }}", "short":false},
                {"title":"Status", "value":"Pipeline fallido ❌ → Deploy cancelado", "short":false}
              ]
            }]
          }'

       # ── JIRA: COMENTARIO SI EL PIPELINE FUE EXITOSO ───
      - name: Comentar en Jira - Éxito
        if: success() && steps.jira.outputs.issue_key != ''
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.jira.outputs.issue_key }}/comment" \
            --data '{
              "body": {
                "type": "doc",
                "version": 1,
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {
                        "type": "text",
                        "text": "✅ Pipeline exitoso en GitHub Actions. Build, tests y deploy completados correctamente."
                      }
                    ]
                  }
                ]
              }
            }'

      # ── JIRA: COMENTARIO SI EL PIPELINE FALLÓ ─────────
      - name: Comentar en Jira - Falla
        if: failure() && steps.jira.outputs.issue_key != ''
        run: |
          curl -s -X POST \
            -u "${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.jira.outputs.issue_key }}/comment" \
            --data '{
              "body": {
                "type": "doc",
                "version": 1,
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {
                        "type": "text",
                        "text": "❌ Pipeline fallido en GitHub Actions. Revisar los logs de build, tests o deploy."
                      }
                    ]
                  }
                ]
              }
            }'